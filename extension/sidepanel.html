<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ModelBridge</title>
    <link rel="icon" type="image/png" href="icons/icon32.png" />
    <link rel="stylesheet" href="sidepanel.css" />
  </head>
  <body>
    <header id="topbar">
      <span id="brand"><img src="icons/icon32.png" alt="" />ModelBridge</span>
      <select id="model" title="选择模型"></select>
      <span id="status" class="status status--off" title="连接状态">●</span>
    </header>

    <main id="messages" aria-live="polite">
      <div id="empty">
        <div class="empty-icon"><img src="icons/icon128.png" alt="ModelBridge" /></div>
        <div class="empty-title">ModelBridge</div>
        <div class="empty-hint">
          可以总结当前网页、回答页面相关问题，<br />
          或帮你点击、填写页面元素。
        </div>
      </div>
    </main>

    <footer id="composer">
      <textarea
        id="input"
        rows="1"
        placeholder="问点什么，或让我读 / 操作当前网页…"
        title="Enter 发送，Shift+Enter 换行"
      ></textarea>
      <button id="send" title="发送 (Enter)">发送</button>
    </footer>

    <script src="sidepanel.js"></script>
  </body>
</html>
