name: release

# Build standalone binaries for Windows / macOS / Linux on every tag
# push (v*.*.*). Each platform job produces an artifact; a final job
# attaches all three to a GitHub Release.
#
# Why a tag trigger: cutting a release means tagging. Other branches
# don't need a 3-platform build — local ``packaging/build_*.sh`` covers
# dev iteration. ``workflow_dispatch`` is provided so you can do a dry
# run from the Actions tab without tagging.

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write  # required by softprops/action-gh-release to attach binaries

jobs:
  # ---------------------------------------------------------------------------
  # Windows: PyInstaller + Inno Setup → ModelBridge-Setup-x.y.z.exe
  # ---------------------------------------------------------------------------
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install project + build deps
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip install pyinstaller

      - name: Build mbridge.exe (PyInstaller)
        shell: pwsh
        run: python -m PyInstaller packaging/mbridge.spec --clean --noconfirm

      - name: Smoke-test the frozen exe
        shell: pwsh
        run: dist/mbridge/mbridge.exe --version

      # Raw onedir tarball for the npm wrapper (and portable use). The Inno
      # installer below can't be exec'd directly; npm needs the bare binary.
      # tar ships with windows-latest; -C dist makes it expand to mbridge/.
      - name: Package onedir tarball (for npm)
        shell: pwsh
        run: |
          $ver = ([regex]::Match((Get-Content pyproject.toml -Raw), 'version\s*=\s*"(.*?)"')).Groups[1].Value
          New-Item -ItemType Directory -Force -Path packaging/Output | Out-Null
          tar -C dist -czf "packaging/Output/mbridge-$ver-windows-x86_64.tar.gz" mbridge
          Get-ChildItem packaging/Output

      # Inno Setup 6 is pre-installed on windows-latest at this path.
      # If GitHub ever moves it, install via Chocolatey: ``choco install innosetup -y``.
      - name: Build installer (Inno Setup)
        shell: pwsh
        run: |
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) {
            choco install innosetup -y --no-progress
          }
          & "$iscc" packaging/installer.iss

      - uses: actions/upload-artifact@v4
        with:
          name: ModelBridge-windows
          path: |
            packaging/Output/ModelBridge-Setup-*.exe
            packaging/Output/mbridge-*-windows-*.tar.gz
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # macOS: PyInstaller → tar.gz (no .pkg, no notarisation — CLI tool)
  # ---------------------------------------------------------------------------
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install project + build deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip install pyinstaller

      - name: Build and package
        run: bash packaging/build_macos.sh

      - uses: actions/upload-artifact@v4
        with:
          name: ModelBridge-macos
          path: packaging/Output/mbridge-*-macos-*.tar.gz
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # Linux: PyInstaller → tar.gz. Run on ubuntu-22.04 instead of -latest so
  # the bundled glibc stays compatible with older distros (Ubuntu 22.04 →
  # glibc 2.35). If you need older support, switch to a manylinux2014
  # container build.
  # ---------------------------------------------------------------------------
  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install project + build deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip install pyinstaller

      - name: Build and package
        run: bash packaging/build_linux.sh

      - uses: actions/upload-artifact@v4
        with:
          name: ModelBridge-linux
          path: packaging/Output/mbridge-*-linux-*.tar.gz
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # Aggregate: attach all three artifacts to a GitHub Release. Runs only
  # on tag pushes (skipped on manual dispatch — manual runs just leave
  # artifacts behind for download).
  # ---------------------------------------------------------------------------
  release:
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifact layout
        run: |
          mkdir -p release-assets
          find artifacts -type f \( -name "*.exe" -o -name "*.tar.gz" \) -exec cp {} release-assets/ \;
          ls -lh release-assets

      - name: Generate SHA256SUMS
        run: |
          cd release-assets
          sha256sum * > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          draft: false
          generate_release_notes: true

  # ---------------------------------------------------------------------------
  # Publish the npm wrapper (mbridge) that downloads the binary above. Runs
  # after the release assets exist. No-ops until an NPM_TOKEN secret is added,
  # so it never blocks a release before you're ready. Version is taken from
  # the tag so the published package fetches the matching release binaries.
  # ---------------------------------------------------------------------------
  publish-npm:
    needs: [release]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Publish to npm (skips if NPM_TOKEN unset)
        working-directory: npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "${NODE_AUTH_TOKEN}" ]; then
            echo "NPM_TOKEN 未配置 → 跳过 npm publish。"
            echo "（在仓库 Settings → Secrets 添加 NPM_TOKEN 后，下次打 tag 会自动发布。）"
            exit 0
          fi
          VER="${GITHUB_REF_NAME#v}"
          npm version "$VER" --no-git-tag-version --allow-same-version
          npm publish --access public
