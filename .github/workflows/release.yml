name: release

# Build standalone binaries for Windows / macOS / Linux on every tag
# push (v*.*.*). Each platform job produces an artifact; a final job
# attaches all three to a GitHub Release.
#
# Why a tag trigger: cutting a release means tagging. Other branches
# don't need a 3-platform build — local ``packaging/build_*.sh`` covers
# dev iteration. ``workflow_dispatch`` is provided so you can do a dry
# run from the Actions tab without tagging.

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write  # required by softprops/action-gh-release to attach binaries

jobs:
  # ---------------------------------------------------------------------------
  # Windows: PyInstaller + Inno Setup → ModelBridge-Setup-x.y.z.exe
  # ---------------------------------------------------------------------------
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install project + build deps
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip install pyinstaller

      - name: Build mbridge.exe (PyInstaller)
        shell: pwsh
        run: python -m PyInstaller packaging/mbridge.spec --clean --noconfirm

      - name: Smoke-test the frozen exe
        shell: pwsh
        run: dist/mbridge/mbridge.exe version

      # Inno Setup 6 is pre-installed on windows-latest at this path.
      # If GitHub ever moves it, install via Chocolatey: ``choco install innosetup -y``.
      - name: Build installer (Inno Setup)
        shell: pwsh
        run: |
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) {
            choco install innosetup -y --no-progress
          }
          & "$iscc" packaging/installer.iss

      - uses: actions/upload-artifact@v4
        with:
          name: ModelBridge-windows
          path: packaging/Output/ModelBridge-Setup-*.exe
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # macOS: PyInstaller → tar.gz (no .pkg, no notarisation — CLI tool)
  # ---------------------------------------------------------------------------
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install project + build deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip install pyinstaller

      - name: Build and package
        run: bash packaging/build_macos.sh

      - uses: actions/upload-artifact@v4
        with:
          name: ModelBridge-macos
          path: packaging/Output/mbridge-*-macos-*.tar.gz
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # Linux: PyInstaller → tar.gz. Run on ubuntu-22.04 instead of -latest so
  # the bundled glibc stays compatible with older distros (Ubuntu 22.04 →
  # glibc 2.35). If you need older support, switch to a manylinux2014
  # container build.
  # ---------------------------------------------------------------------------
  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install project + build deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip install pyinstaller

      - name: Build and package
        run: bash packaging/build_linux.sh

      - uses: actions/upload-artifact@v4
        with:
          name: ModelBridge-linux
          path: packaging/Output/mbridge-*-linux-*.tar.gz
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # Aggregate: attach all three artifacts to a GitHub Release. Runs only
  # on tag pushes (skipped on manual dispatch — manual runs just leave
  # artifacts behind for download).
  # ---------------------------------------------------------------------------
  release:
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifact layout
        run: |
          mkdir -p release-assets
          find artifacts -type f \( -name "*.exe" -o -name "*.tar.gz" \) -exec cp {} release-assets/ \;
          ls -lh release-assets

      - uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          draft: false
          generate_release_notes: true
